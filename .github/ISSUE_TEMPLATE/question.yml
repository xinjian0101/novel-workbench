name: Question
description: Ask about setup, workflow fit, or how to use Novel Workbench.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended workflow discussion, GitHub Discussions is usually better. Use this form when the answer should become documentation or a focused issue.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include commands tried, docs read, and the writing workflow you are evaluating.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installation
        - CLI usage
        - Import/export
        - Static site demo
        - Contributing
        - Other
    validations:
      required: true
