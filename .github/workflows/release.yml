name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-check:
    name: Package check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verify package install
        run: python scripts/release_check.py
      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: package-check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          pattern: dist-ubuntu-latest
          path: release-dist
          merge-multiple: true
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-dist/* --clobber
          else
            gh release create "$TAG_NAME" release-dist/* --generate-notes --title "$TAG_NAME" --verify-tag
          fi
