<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Novel Workbench social preview</title>
  <desc id="desc">A branded preview for a local-first command line workspace for novel writing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="58%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <g opacity="0.16" fill="none" stroke="#ffffff" stroke-width="1">
    <path d="M0 140h1280M0 260h1280M0 380h1280M0 500h1280"/>
    <path d="M180 0v640M420 0v640M660 0v640M900 0v640M1140 0v640"/>
  </g>
  <g transform="translate(96 82)">
