    <text x="0" y="104" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800">Local-first novel writing</text>
    <text x="0" y="184" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="40">Plan chapters. Track momentum. Export Markdown and static sites.</text>
    <g transform="translate(0 250)" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
      <rect x="0" y="0" width="190" height="58" rx="12" fill="#ecfeff"/>
      <text x="28" y="38" fill="#134e4a">No cloud</text>
      <rect x="214" y="0" width="190" height="58" rx="12" fill="#ecfeff"/>
      <text x="242" y="38" fill="#134e4a">Markdown</text>
      <rect x="428" y="0" width="180" height="58" rx="12" fill="#ecfeff"/>
      <text x="456" y="38" fill="#134e4a">Python CLI</text>
    </g>
  </g>
  <g transform="translate(778 116)" filter="url(#shadow)">
    <rect width="382" height="408" rx="18" fill="#f8fafc"/>
    <rect x="0" y="0" width="382" height="64" rx="18" fill="#e2e8f0"/>
    <circle cx="34" cy="32" r="8" fill="#ef4444"/>
    <circle cx="60" cy="32" r="8" fill="#f59e0b"/>
    <circle cx="86" cy="32" r="8" fill="#10b981"/>
    <text x="32" y="112" fill="#111827" font-family="Consolas, monospace" font-size="21">$ novel focus moon-archive</text>
    <text x="32" y="162" fill="#0f766e" font-family="Consolas, monospace" font-size="21">Next Writing Move</text>
    <text x="32" y="206" fill="#334155" font-family="Consolas, monospace" font-size="19">Chapter 1: Descent</text>
    <text x="32" y="244" fill="#334155" font-family="Consolas, monospace" font-size="19">Logged: 1,250 words</text>
    <text x="32" y="282" fill="#334155" font-family="Consolas, monospace" font-size="19">Target: 80,000 words</text>
    <rect x="32" y="330" width="318" height="20" rx="10" fill="#cbd5e1"/>
    <rect x="32" y="330" width="76" height="20" rx="10" fill="#0f766e"/>
