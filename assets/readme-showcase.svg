<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Novel Workbench feature showcase</title>
  <desc id="desc">A three-panel overview showing terminal workflow, project dashboard, and export outputs.</desc>
  <rect width="1120" height="560" fill="#f8fafc"/>
  <text x="56" y="70" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">A local workspace for long-form fiction</text>
  <text x="56" y="108" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">Plan, draft, track, hand off, and publish without a cloud account.</text>
  <g transform="translate(56 150)">
    <rect width="310" height="310" rx="16" fill="#111827"/>
    <text x="24" y="48" fill="#99f6e4" font-family="Consolas, monospace" font-size="18">$ novel sample</text>
    <text x="24" y="86" fill="#e5e7eb" font-family="Consolas, monospace" font-size="17">Created moon-archive</text>
    <text x="24" y="132" fill="#99f6e4" font-family="Consolas, monospace" font-size="18">$ novel momentum</text>
    <text x="24" y="170" fill="#e5e7eb" font-family="Consolas, monospace" font-size="17">Weekly totals</text>
    <text x="24" y="208" fill="#e5e7eb" font-family="Consolas, monospace" font-size="17">Current streak: 1 day</text>
    <text x="24" y="254" fill="#99f6e4" font-family="Consolas, monospace" font-size="18">$ novel export-site</text>
  </g>
  <g transform="translate(405 150)">
    <rect width="310" height="310" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="24" y="48" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Project dashboard</text>
    <g font-family="Segoe UI, Arial, sans-serif">
      <rect x="24" y="78" width="118" height="74" rx="10" fill="#ecfeff"/>
      <text x="42" y="108" fill="#475569" font-size="14">Words</text>
      <text x="42" y="138" fill="#111827" font-size="28" font-weight="800">8</text>
      <rect x="168" y="78" width="118" height="74" rx="10" fill="#ecfeff"/>
      <text x="186" y="108" fill="#475569" font-size="14">Logged</text>
      <text x="186" y="138" fill="#111827" font-size="28" font-weight="800">1,250</text>
      <text x="24" y="202" fill="#111827" font-size="18" font-weight="700">Next Action</text>
      <text x="24" y="236" fill="#475569" font-size="16">Continue Chapter 1: Descent.</text>
      <text x="24" y="270" fill="#475569" font-size="16">Preserve notes and recent progress.</text>
    </g>
  </g>
  <g transform="translate(754 150)">
    <rect width="310" height="310" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="24" y="48" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Export outputs</text>
    <g font-family="Segoe UI, Arial, sans-serif" font-size="18">
      <rect x="24" y="82" width="262" height="42" rx="8" fill="#f1f5f9"/>
      <text x="44" y="110" fill="#111827">manuscript.md</text>
      <rect x="24" y="142" width="262" height="42" rx="8" fill="#f1f5f9"/>
      <text x="44" y="170" fill="#111827">handoff brief</text>
      <rect x="24" y="202" width="262" height="42" rx="8" fill="#f1f5f9"/>
      <text x="44" y="230" fill="#111827">context.json</text>
      <rect x="24" y="262" width="262" height="42" rx="8" fill="#f1f5f9"/>
      <text x="44" y="290" fill="#111827">static site</text>
    </g>
  </g>
</svg>
