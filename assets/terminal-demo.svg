<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Novel Workbench terminal demo</title>
  <desc id="desc">A terminal-style preview showing sample creation, focus, handoff, and export commands.</desc>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="56" y="64" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">From empty workspace to shareable manuscript kit</text>
  <text x="56" y="102" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">Run local commands, keep the project in plain files, and export Markdown, JSON, and a static site.</text>
  <g transform="translate(56 138)">
    <rect width="1008" height="330" rx="16" fill="#0f172a"/>
    <rect width="1008" height="52" rx="16" fill="#1e293b"/>
    <circle cx="28" cy="26" r="8" fill="#ef4444"/>
    <circle cx="54" cy="26" r="8" fill="#f59e0b"/>
    <circle cx="80" cy="26" r="8" fill="#10b981"/>
    <text x="118" y="33" fill="#cbd5e1" font-family="Consolas, monospace" font-size="17">novel-workbench demo</text>
    <g font-family="Consolas, monospace" font-size="18">
      <text x="32" y="92" fill="#99f6e4">$ novel --workspace workspace sample</text>
      <text x="32" y="124" fill="#e5e7eb">Created sample project: moon-archive (2 chapters)</text>
      <text x="32" y="168" fill="#99f6e4">$ novel --workspace workspace focus moon-archive</text>
      <text x="32" y="200" fill="#e5e7eb">Next Writing Move: Continue Chapter 1: Descent [draft] - 8 words</text>
      <text x="32" y="244" fill="#99f6e4">$ novel --workspace workspace handoff moon-archive</text>
      <text x="32" y="276" fill="#e5e7eb">Project snapshot, continuity notes, recent progress, and a continuation prompt</text>
      <text x="32" y="320" fill="#99f6e4">$ novel --workspace workspace export-pack moon-archive exports/moon-archive-pack</text>
    </g>
  </g>
</svg>
